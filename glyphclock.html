<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="currentTimeTitle">GlyphClock</title>
  <meta name="description" content="See the current GlyphClock — a universal, timezone-free time shown as symbols.">
  <link rel="stylesheet" href="css/styles.css">
  <script>(function(){try{var p=new URLSearchParams(location.search).get('theme');if(p==='light'||p==='dark'){localStorage.setItem('darkMode',p==='dark');if(p==='dark')document.documentElement.classList.add('dark');return}var d=localStorage.getItem('darkMode');if(d==='true'||(d===null&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}})()</script>
</head>
<body data-page="glyphclock" class="clock-page">
  <div class="clock-center">
    <h2 id="currentTime"></h2>
    <div id="testControls" class="test-controls" style="display:none">
      <button id="testPrev" class="test-btn">◀</button>
      <span id="testInfo"></span>
      <button id="testNext" class="test-btn">▶</button>
    </div>
    <p id="glyphTimeline" style="font-size: 40px; text-align: center">🥐➳🦋➳🌷➳☂️➳🌵➳🎈➳👓➳⚓➳🦚➳<span id="testModeToggle" style="cursor:pointer" title="Test mode">🤖</span>➳⭐➳☁️➳🌲➳🪁➳🪑➳♻➳</p>
  </div>
  <script src="scripts.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
